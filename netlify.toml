# Repository root is this Vite app. Netlify: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# React Router (BrowserRouter)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
